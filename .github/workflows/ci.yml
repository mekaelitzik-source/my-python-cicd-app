name: CI Pipeline                         # Name of the workflow shown in GitHub Actions tab

on:                                       # Defines when this workflow will run
  push:                                   # Run workflow when code is pushed
    branches:                             # List of branches for push trigger
      - main                              # Run only when pushing to main branch

  pull_request:                           # Run workflow when a pull request is opened
    branches:                             # List of branches for pull request trigger
      - main                              # Run only for pull requests targeting main branch

jobs:                                     # Jobs are separate groups of steps in GitHub Actions

  test:                                   # First job name; this job only tests the Python app
    runs-on: ubuntu-latest                # GitHub creates a temporary Ubuntu Linux runner for this job

    steps:                                # Steps inside the test job
      - name: Checkout code               # Step name shown in GitHub Actions UI
        uses: actions/checkout@v4         # Downloads your GitHub repository code into the runner

      - name: Set up Python               # Step name shown in GitHub Actions UI
        uses: actions/setup-python@v5     # Installs Python on the runner
        with:                             # Extra configuration for setup-python
          python-version: "3.11"          # Python version used by the test job

      - name: Install dependencies        # Step name shown in GitHub Actions UI
        run: |                            # Run multiple Linux shell commands
          python -m pip install --upgrade pip   # Upgrade pip package installer
          pip install -r requirements.txt        # Install Flask, Gunicorn, and Pytest

      - name: Run tests with pytest        # Step name shown in GitHub Actions UI
        run: |                            # Run shell commands
          python -m pytest -v             # Run all pytest tests with detailed output


  docker-build-push:                      # Second job name; this job builds and pushes Docker image
    runs-on: ubuntu-latest                # GitHub creates a new temporary Ubuntu runner for this job
    needs: test                           # This job runs only after the test job succeeds

    steps:                                # Steps inside the docker-build-push job
      - name: Checkout code               # Step name shown in GitHub Actions UI
        uses: actions/checkout@v4         # Downloads your GitHub repository code again into this new runner

      - name: Login to Docker Hub          # Step name shown in GitHub Actions UI
        uses: docker/login-action@v3       # Official Docker action used to authenticate to Docker Hub
        with:                             # Extra configuration for Docker login action
          username: ${{ secrets.DOCKERHUB_USERNAME }}   # GitHub Secret containing Docker Hub username
          password: ${{ secrets.DOCKERHUB_TOKEN }}      # GitHub Secret containing Docker Hub access token

      - name: Build Docker image with commit SHA and latest        # Step name shown in GitHub Actions UI
        run: |                                                     # Run shell command
          docker build -t michaelitzik/my-python-cicd-app:${{ github.sha }} -t michaelitzik/my-python-cicd-app:latest .   # Build one image with two tags

      - name: Push Docker image with commit SHA                    # Step name shown in GitHub Actions UI
        run: |                                                     # Run shell command
          docker push michaelitzik/my-python-cicd-app:${{ github.sha }}   # Push exact commit image tag to Docker Hub

      - name: Push Docker image with latest tag                    # Step name shown in GitHub Actions UI
        run: |                                                     # Run shell command
          docker push michaelitzik/my-python-cicd-app:latest       # Push latest image tag to Docker Hub
